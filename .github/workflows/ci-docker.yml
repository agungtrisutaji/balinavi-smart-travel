name: CI Docker

on:
  push:
    branches:
      - main
      - develop
      - "feature/**"
  pull_request:
    branches:
      - main
      - develop

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest tests/ -v

      - name: Validate Docker Compose config
        run: docker compose config

      - name: Build backend Docker image
        run: docker build -f docker/backend.Dockerfile -t balinavi-backend .

      - name: Build frontend Docker image
        run: docker build -f docker/frontend.Dockerfile -t balinavi-frontend .
